# Pinned Python dependencies for the cocotb + Verilator verification environment.
# Install into the MSYS2 ucrt64 (MinGW) python -- NOT an MSVC/venv python (the VPI link is
# ABI-tied to the MinGW interpreter). See toolchain/README.md and install_toolchain.ps1.
#
#   COCOTB_IGNORE_PYTHON_REQUIRES=1 <ucrt64>/bin/python -m pip install \
#       --break-system-packages -r verification/cocotb/requirements.lock
#
# Pin cocotb + Verilator together: the static VPI lib (bootstrap_vpi.py) is rebuilt from
# the cocotb sources matching this exact version and linked against the installed Verilator.
