# Block registry for the cocotb + Verilator verification environment.
#
# runner.py reads this to select a suite and produce the regression report. Each
# test_<block>.py is self-contained (it declares its own sources / toplevel / parameters
# and is runnable directly with `pytest <path>`); this manifest holds only the
# orchestration metadata: group, suites, engine, and the test path. This is the successor
# to the per-block DSim `.f` filelists.
#
# suites: a block may belong to several. "smoke" = the fast completion gate (the new
# equivalent of the old base-instructions `run_regression.ps1 -Suite smoke`). "parity" =
# blocks proven to match their DSim verdict during the migration. "stress" = the same
# frame tests re-run under randomized valid-gap / backpressure timing (see lib/gap.py).

[defaults]
engine = "verilator"

# Sim-free self-tests for the img_proc golden models (the oracle for the whole `image`
# suite). engine="none" -> runs plain pytest, not gated on Verilator being on PATH. In
# `smoke` so a corrupted golden fails the completion gate before any sim runs.
[blocks.golden_selftest]
group = "img_proc"
suites = ["smoke", "image", "migrated"]
engine = "none"
path = "verification/cocotb/golden_selftest"

# Sim-free functional-coverage closure: asserts the golden input space reaches its behavioral
# corners (saturation both rails, border+interior, threshold both sides, both dither modes)
# and that the GapPolicy emits the gap sizes it claims. engine="none".
[blocks.img_coverage]
group = "img_proc"
suites = ["smoke", "image", "migrated"]
engine = "none"
path = "verification/cocotb/img_coverage"

