# image-file-driven pyuvm test: streams a user image (or a builtin pattern) through a
# selectable img_proc slot DUT, golden-model scoreboard + PNG capture. Runs 6 Verilator
# builds (conv3x3/conv5x5/conv5x5_sep/prefilter/proc_slot/dither), so it lives in "image"
# (and migrated), NOT smoke.
[blocks.img_file_uvm]
group = "img_proc"
suites = ["migrated", "image", "stress"]
path = "verification/cocotb/img_file_uvm"
